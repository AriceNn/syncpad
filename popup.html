<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncPad</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- SETUP VIEW -->
    <div id="setup-view" class="view active">
        <h2>Welcome to SyncPad</h2>
        <p>Set up this device to start syncing.</p>
        
        <div class="setup-buttons">
            <button id="btn-master" class="btn primary">I am Master Device</button>
            <button id="btn-slave" class="btn secondary">I am Slave Device</button>
        </div>

        <div id="master-setup" class="hidden">
            <p>Save these 25 words. You will need them to connect other devices.</p>
            <div id="seed-display" class="seed-box"></div>
            <button id="btn-master-done" class="btn primary">I saved them, Continue</button>
        </div>

        <div id="slave-setup" class="hidden">
            <p>Enter the 25-word phrase from your Master device (separated by spaces).</p>
            <textarea id="seed-input" placeholder="Enter 25 words here..."></textarea>
            <button id="btn-slave-done" class="btn primary">Connect</button>
            <p id="slave-error" class="error-text hidden">Invalid phrase length. Must be 25 words.</p>
        </div>
    </div>

    <!-- MAIN VIEW -->
    <div id="main-view" class="view hidden">
        <div class="tabs">
            <button id="tab-clipboard" class="tab-btn active">Clipboard</button>
            <button id="tab-notepad" class="tab-btn">Notepad</button>
        </div>
        
        <div class="tab-content">
            <!-- CLIPBOARD -->
            <div id="content-clipboard" class="content-pane active">
                <button id="btn-capture-clipboard" class="btn primary">Push Current Clipboard</button>
                <div id="clipboard-list">
                    <!-- Items go here -->
                </div>
            </div>

            <!-- NOTEPAD -->
            <div id="content-notepad" class="content-pane hidden">
                <textarea id="notepad-textarea" maxlength="10000" placeholder="Type your notes here..."></textarea>
                <div class="notepad-footer">
                    <span id="char-count">0 / 10000</span>
                    <button id="btn-sync-notepad" class="btn primary">Save & Sync</button>
                </div>
                <div id="sync-status" class="status-text"></div>
            </div>
        </div>
    </div>

    <!-- Bip39 Wordlist (simplified) -->
    <script src="wordlist.js"></script>
    <script src="crypto.js"></script>
    <script src="popup.js"></script>
</body>
</html>
