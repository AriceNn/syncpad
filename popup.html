<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncPad</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- LOADING OVERLAY -->
    <div id="loading-overlay" class="overlay hidden">
        <div class="spinner"></div>
    </div>

    <!-- SETUP VIEW -->
    <div id="setup-view" class="view active">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title" data-i18n="welcome_title">Welcome to SyncPad</h2>
                <p class="card-description" data-i18n="welcome_desc">Set up this device to start syncing.</p>
            </div>
            <div class="card-content setup-buttons">
                <button id="btn-master" class="btn primary w-full mb-3" data-i18n="btn_master">Create New Account</button>
                <button id="btn-slave" class="btn outline w-full" data-i18n="btn_slave">Link Existing Device</button>
            </div>

            <div id="slave-setup" class="card-content hidden">
                <p class="text-sm text-muted mb-4 text-center" data-i18n="slave_desc">Enter the 25-word phrase from your connected device.</p>
                <textarea id="seed-input" class="input mb-4 h-24" data-i18n-placeholder="slave_placeholder" placeholder="Enter 25 words here..."></textarea>
                <p id="slave-error" class="text-sm text-destructive mb-4 text-center hidden">Invalid phrase.</p>
                <div class="flex gap-2">
                    <button id="btn-slave-back" class="btn outline flex-1" data-i18n="btn_cancel">Cancel</button>
                    <button id="btn-slave-done" class="btn primary flex-1" data-i18n="btn_connect">Connect</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN VIEW -->
    <div id="main-view" class="view hidden">
        
        <header class="header">
            <div class="tabs-list">
                <button id="tab-clipboard" class="tab-trigger active" data-i18n="tab_clipboard">Clipboard</button>
                <button id="tab-notepad" class="tab-trigger" data-i18n="tab_notepad">Notepad</button>
            </div>
            <div class="header-actions" style="display: flex; gap: 0.25rem;">
                <button id="btn-refresh" class="btn ghost icon-only" title="Refresh" aria-label="Refresh">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
                <button id="btn-settings" class="btn ghost icon-only" title="Settings" aria-label="Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </header>

        <div class="content-area">
            <!-- CLIPBOARD -->
            <div id="content-clipboard" class="tab-content active">
                <div class="p-4 border-b border-border sticky top-0 bg-background z-10">
                    <button id="btn-capture-clipboard" class="btn primary w-full" data-i18n="btn_push_clipboard">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
                        Push Current Clipboard
                    </button>
                </div>
                <div id="clipboard-list" class="list-container">
                    <!-- Items go here -->
                </div>
            </div>

            <!-- NOTEPAD -->
            <div id="content-notepad" class="tab-content hidden">
                <div class="p-4 border-b border-border sticky top-0 bg-background z-10">
                    <button id="btn-new-note" class="btn primary w-full" data-i18n="btn_new_note">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        New Note
                    </button>
                </div>
                
                <!-- NEW NOTE EDITOR -->
                <div id="note-editor" class="hidden p-4 border-b border-border bg-muted/30">
                    <textarea id="notepad-textarea" class="input h-32 mb-3" maxlength="10000" data-i18n-placeholder="note_placeholder" placeholder="Type your notes here..."></textarea>
                    <div class="flex justify-between items-center">
                        <span id="char-count" class="text-xs text-muted font-mono">0 / 10000</span>
                        <div class="flex gap-2">
                            <button id="btn-cancel-note" class="btn outline text-xs px-3 py-1.5 h-8" data-i18n="btn_cancel">Cancel</button>
                            <button id="btn-save-note" class="btn primary text-xs px-3 py-1.5 h-8" data-i18n="btn_save_note">Save Note</button>
                        </div>
                    </div>
                </div>

                <div id="notepad-list" class="list-container">
                    <!-- Saved notes go here -->
                </div>
            </div>
        </div>
        
        <div id="sync-status" class="status-toast hidden">Synced Successfully</div>
    </div>

    <!-- SETTINGS OVERLAY -->
    <div id="settings-overlay" class="overlay hidden">
        <div class="card w-full">
            <div class="card-header">
                <h3 class="card-title" data-i18n="settings_title">Settings</h3>
                <p class="card-description" data-i18n="settings_desc">Your 25-word recovery phrase. Use this to link other devices.</p>
            </div>
            <div class="card-content">
                <div id="settings-seed-display" class="seed-box mb-4"></div>
                <button id="btn-copy-seed" class="btn outline w-full mb-6" data-i18n="btn_copy_seed">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    Copy Phrase
                </button>
                
                <div class="mb-6 flex items-center justify-between">
                    <label class="text-sm font-medium" data-i18n="settings_lang">Language</label>
                    <select id="lang-select" class="input p-2 h-auto w-32" style="padding-top: 0.25rem; padding-bottom: 0.25rem;">
                        <option value="en">English</option>
                        <option value="tr">Türkçe</option>
                        <option value="de">Deutsch</option>
                        <option value="fr">Français</option>
                    </select>
                </div>

                <div class="flex gap-2">
                    <button id="btn-close-settings" class="btn secondary flex-1" data-i18n="btn_close">Close</button>
                    <button id="btn-logout" class="btn destructive flex-1" data-i18n="btn_logout">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bip39 Wordlist -->
    <script src="wordlist.js"></script>
    <script src="config.js"></script>
    <script src="crypto.js"></script>
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
</body>
</html>
