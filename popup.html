<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncPad</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- SETUP VIEW -->
    <div id="setup-view" class="view active">
        <div class="setup-header">
            <h2>Welcome to SyncPad</h2>
            <p>Set up this device to start syncing.</p>
        </div>
        
        <div class="setup-buttons">
            <button id="btn-master" class="btn primary">Create New Account (Master)</button>
            <button id="btn-slave" class="btn secondary">Link Device (Slave)</button>
        </div>

        <div id="slave-setup" class="hidden">
            <p class="instruction">Enter the 25-word phrase from your Master device.</p>
            <textarea id="seed-input" placeholder="Enter 25 words here..."></textarea>
            <button id="btn-slave-done" class="btn primary">Connect</button>
            <button id="btn-slave-back" class="btn secondary">Back</button>
            <p id="slave-error" class="error-text hidden">Invalid phrase length. Must be 25 words.</p>
        </div>
    </div>

    <!-- MAIN VIEW -->
    <div id="main-view" class="view hidden">
        <div class="header">
            <div class="tabs-container">
                <div class="tabs-bg"></div>
                <button id="tab-clipboard" class="tab-btn active">Clipboard</button>
                <button id="tab-notepad" class="tab-btn">Notes</button>
            </div>
            <button id="btn-settings" class="icon-btn" title="Settings & Backup" aria-label="Settings">
                ⚙️
            </button>
        </div>
        
        <div class="tab-content">
            <!-- CLIPBOARD -->
            <div id="content-clipboard" class="content-pane active">
                <div class="action-bar">
                    <button id="btn-capture-clipboard" class="btn primary">Push Current Clipboard</button>
                </div>
                <div id="clipboard-list" class="list-container">
                    <!-- Items go here -->
                </div>
            </div>

            <!-- NOTEPAD -->
            <div id="content-notepad" class="content-pane hidden">
                <div class="action-bar">
                    <button id="btn-new-note" class="btn primary">+ New Note</button>
                </div>
                
                <!-- NEW NOTE EDITOR -->
                <div id="note-editor" class="hidden">
                    <textarea id="notepad-textarea" maxlength="10000" placeholder="Type your notes here..."></textarea>
                    <div class="notepad-footer">
                        <span id="char-count">0 / 10000</span>
                        <div class="editor-buttons">
                            <button id="btn-cancel-note" class="btn secondary small">Cancel</button>
                            <button id="btn-save-note" class="btn primary small">Save</button>
                        </div>
                    </div>
                </div>

                <div id="notepad-list" class="list-container">
                    <!-- Saved notes go here -->
                </div>
            </div>
        </div>
        <div id="sync-status" class="status-indicator hidden">Synced</div>
    </div>

    <!-- SETTINGS OVERLAY -->
    <div id="settings-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h3>Settings & Backup</h3>
            <p>Your 25-word recovery phrase. Use this to link other devices.</p>
            <div id="settings-seed-display" class="seed-box"></div>
            <button id="btn-copy-seed" class="btn primary">Copy Phrase</button>
            <hr class="divider">
            <button id="btn-logout" class="btn danger">Logout / Disconnect</button>
            <button id="btn-close-settings" class="btn secondary">Close</button>
        </div>
    </div>

    <!-- Bip39 Wordlist (simplified) -->
    <script src="wordlist.js"></script>
    <script src="config.js"></script>
    <script src="crypto.js"></script>
    <script src="popup.js"></script>
</body>
</html>
